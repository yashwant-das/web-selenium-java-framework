# ──────────────────────────────────────────────────────────────
# local.properties — Local development environment
# Default: all values safe for running on a developer's machine
# Override any key via OS environment variable (e.g. export BASE_URL=...)
# ──────────────────────────────────────────────────────────────

base.url=https://the-internet.herokuapp.com
browser=chrome
browser.headless=false

implicit.wait.seconds=10
explicit.wait.seconds=15
page.load.timeout.seconds=30

remote.url=

retry.count=1

bidi.enabled=false

screenshot.on.failure=true
screenshot.on.step=false

environment.name=Local (Dev)
