# ──────────────────────────────────────────────────────────────
# prod.properties — Production environment (read-only / dry-run)
# NO RETRIES in production — failures are real. Do NOT replay tests against live production without approval.
# Credentials from env vars only.
# ──────────────────────────────────────────────────────────────

base.url=https://the-internet.herokuapp.com
browser=chrome
browser.headless=true

implicit.wait.seconds=10
explicit.wait.seconds=30
page.load.timeout.seconds=60

remote.url=

retry.count=0

bidi.enabled=false

screenshot.on.failure=true
screenshot.on.step=false

environment.name=PROD
