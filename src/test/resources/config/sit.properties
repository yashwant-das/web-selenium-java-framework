# ──────────────────────────────────────────────────────────────
# sit.properties — System Integration Test environment
# Used for integration tests that require downstream services.
# Credentials provided via environment variables only.
# ──────────────────────────────────────────────────────────────

base.url=https://the-internet.herokuapp.com
browser=chrome
browser.headless=true

implicit.wait.seconds=10
explicit.wait.seconds=20
page.load.timeout.seconds=45

remote.url=

retry.count=2

bidi.enabled=false

screenshot.on.failure=true
screenshot.on.step=false

environment.name=SIT
