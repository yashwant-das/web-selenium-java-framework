# ──────────────────────────────────────────────────────────────
# qa.properties — QA (Quality Assurance) environment
# Typically points to a staging-like QA instance.
# Credentials SHOULD be provided via environment variables only.
# ──────────────────────────────────────────────────────────────

base.url=https://the-internet.herokuapp.com
browser=chrome
browser.headless=true

implicit.wait.seconds=10
explicit.wait.seconds=15
page.load.timeout.seconds=30

remote.url=

retry.count=1

bidi.enabled=false

screenshot.on.failure=true
screenshot.on.step=false

environment.name=QA
